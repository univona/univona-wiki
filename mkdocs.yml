site_name: Univona 官方 Wiki
site_description: Univona 官方文档、API 参考与部署指南
site_url: https://univona.github.io/univona-wiki/
repo_url: https://github.com/univona/univona-wiki
repo_name: univona/univona-wiki
edit_uri: blob/main/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed

nav:
  - 首页: index.md
  - 01 项目介绍:
      - 产品概述: 01-项目介绍/产品概述.md
